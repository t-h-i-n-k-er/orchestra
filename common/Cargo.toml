[package]
name = "common"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
serde = { workspace = true }
thiserror = { workspace = true }
aes-gcm = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
anyhow = { workspace = true }
async-trait = "0.1"
tokio = { workspace = true, features = ["net", "io-util"] }
serde_json = "1.0"
toml = "1.1.2"
rustls = { version = "0.23.38", default-features = false, features = ["ring", "std", "logging", "tls12"] }
tokio-rustls = { version = "0.26.4", default-features = false, features = ["ring", "logging", "tls12"] }
rustls-pemfile = "2.2.0"

# Optional: ephemeral X25519 key exchange for forward secrecy.
# Enabled by the `forward-secrecy` feature.
x25519-dalek = { version = "2", optional = true }
hkdf = { version = "0.12", optional = true }

[features]
forward-secrecy = ["dep:x25519-dalek", "dep:hkdf"]

[dev-dependencies]
serde_json = "1.0"
