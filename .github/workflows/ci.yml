name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check (default features)
        run: cargo check

  check-linux-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check (selected agent features)
        run: cargo check -p agent --features outbound-c,env-validation,persistence,network-discovery,memory-guard,forward-secrecy

  check-windows-cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Add Windows MSVC target
        run: rustup target add x86_64-pc-windows-msvc
      - name: cargo check (Windows MSVC target)
        run: cargo check --target x86_64-pc-windows-msvc

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo clippy (default features)
        run: cargo clippy -- -D warnings

