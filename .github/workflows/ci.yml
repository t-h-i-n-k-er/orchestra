name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxrandr-dev libdbus-1-dev pkg-config

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check (default features)
        run: cargo check --workspace

      - name: cargo clippy (default features)
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test (default features)
        run: cargo test --workspace

      # Optional features. `remote-assist` is Linux/X11 only; skip on others.
      - name: cargo test (persistence + network-discovery + hci-research)
        run: cargo test -p agent --features "persistence network-discovery hci-research"

      # NOTE: `remote-assist` is currently disabled in CI because the upstream
      # `x11cap 0.1` crate does not compile on modern rustc (E0614 on
      # `Unique<_XDisplay>`). Re-enable once we replace x11cap with `xcb` or
      # similar.

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit
