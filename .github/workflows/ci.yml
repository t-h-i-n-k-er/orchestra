name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check (default features)
        run: cargo check

  check-linux-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check (selected agent features)
        run: cargo check -p agent --features outbound-c,env-validation,persistence,network-discovery,memory-guard,forward-secrecy

  check-windows-cross:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Add Windows MSVC target
        run: rustup target add x86_64-pc-windows-msvc
      - name: cargo check (Windows MSVC target, with MinGW fallback)
        run: |
          set -euo pipefail

          if cargo check -p agent \
            --target x86_64-pc-windows-msvc \
            --features direct-syscalls,manual-map,stealth,env-validation; then
            echo "Windows MSVC compile check succeeded"
            exit 0
          fi

          echo "Windows MSVC compile check failed/unavailable; installing MinGW fallback"
          sudo apt-get update
          sudo apt-get install -y mingw-w64
          rustup target add x86_64-pc-windows-gnu
          cargo check -p agent \
            --target x86_64-pc-windows-gnu \
            --features direct-syscalls,manual-map,stealth,env-validation

  check-macos-cross:
    continue-on-error: true
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Add macOS x86_64 target
        run: rustup target add x86_64-apple-darwin
      - name: cargo check (macOS x86_64 target)
        run: cargo check -p agent --target x86_64-apple-darwin --features persistence,env-validation,remote-assist

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo clippy (default features)
        run: cargo clippy -- -D warnings

